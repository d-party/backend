name: License Check

on:
  push:

jobs:
  license-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: run docker compose
        # Only the django service (and its postgres/redis deps) is needed here.
        # Starting the whole stack would try to build the `frontend` service,
        # whose `context: ../frontend` does not exist in this backend-only
        # checkout (it is a sibling submodule of the monorepo).
        run: |
          docker compose up -d django
      - name: init containers
        run: |
          docker compose exec -T django python manage.py makemigrations;
          docker compose exec -T django python manage.py makemigrations streamer;
          docker compose exec -T django python manage.py migrate;
          docker compose exec -T django python manage.py collectstatic --noinput;
      - name: check licenses
        run: >
          docker compose exec -T django pip-licenses
          --with-system
          --allow-only="
            Apache Software License;
            Apache-2.0;
            BSD License;BSD;
            BSD-3-Clause;BSD-2-Clause;0BSD;
            Freeware;
            GNU General Public License (GPL);
            GNU Lesser General Public License v3 or later (LGPLv3+);
            LGPL-3.0-only;LGPL-3.0-or-later;
            MIT License;
            MIT;
            Mozilla Public License 2.0 (MPL 2.0);
            MPL-2.0;
            Python Software Foundation License;
            PSF-2.0;Python-2.0;
            Public Domain;
            UNKNOWN;
            The Unlicense (Unlicense);
            Unlicense;
            Zope Public License;
            ISC License (ISCL);
            ISC;
            "
