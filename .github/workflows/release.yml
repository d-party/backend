name: Release

# d-party モノレポ root の release ワークフローから統一バージョンを受け取って起動される。
# pyproject.toml の version を書き換えて main へコミットし、タグ + GitHub Release を作る。

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (X.Y.Z)"
        required: true
        default: "x.y.z"
      release_note:
        description: "release note"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Bump version and commit
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import os, re
          v = os.environ["VERSION"]
          path = "pyproject.toml"
          s = open(path, encoding="utf-8").read()
          s = re.sub(r'(?m)^version\s*=\s*".*"$', f'version = "{v}"', s, count=1)
          open(path, "w", encoding="utf-8").write(s)
          EOF
          # uv.lock records the project version too; refresh it so the lock does
          # not drift from pyproject.toml on release (deps unchanged → version only).
          uv lock
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml uv.lock
          if git diff --cached --quiet; then
            echo "pyproject.toml already at v${VERSION}; skipping bump commit"
          else
            git commit -m "chore: bump version to v${VERSION} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Force-update release tag
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          set -euo pipefail
          git tag -f "v${VERSION}"
          git push origin "refs/tags/v${VERSION}" --force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          body: ${{ github.event.inputs.release_note }}
          generate_release_notes: true
          target_commitish: main

  # release ジョブが push した `vX.Y.Z` タグの commit を native arm64 でビルドし、
  # GHCR(public) へ push する（prod-kube / Argo CD の配信元）。backend は設定を
  # すべて runtime env で読むため build-args は不要。初回 push 後に GHCR Package
  # を一度だけ Public にすること。
  build-push:
    needs: release
    runs-on: ubuntu-24.04-arm           # native arm64 (no QEMU)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ github.event.inputs.version }}
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          # version 入力からタグを直接組み立てる（git タグと完全一致・`v` 付き）。
          tags: ghcr.io/d-party/backend:v${{ github.event.inputs.version }}
