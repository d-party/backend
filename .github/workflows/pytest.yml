name: Pytest

on:
  push:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: run docker compose
        # Only the django service (and its postgres/redis deps) is needed for
        # tests. Starting the whole stack would try to build the `frontend`
        # service, whose `context: ../frontend` does not exist in this
        # backend-only checkout (it is a sibling submodule of the monorepo).
        run: |
          docker compose up -d django
      - name: init containers
        run: |
          docker compose exec -T django python manage.py makemigrations;
          docker compose exec -T django python manage.py makemigrations streamer;
          docker compose exec -T django python manage.py migrate;
          docker compose exec -T django python manage.py collectstatic --noinput;
      - name: run pytest
        run: |
          docker compose exec -T django pytest --cov --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./Django/coverage.xml
          env_vars: OS,PYTHON
          name: codecov-umbrella
          # Coverage upload needs CODECOV_TOKEN; on protected branches a missing
          # token otherwise fails the whole job. Tests themselves gate CI, so a
          # failed upload should not be fatal.
          fail_ci_if_error: false
          verbose: true
