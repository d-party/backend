name: Security

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "25 21 * * 5"

jobs:
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: install bandit
        run: pip install bandit
      - name: Checkout
        uses: actions/checkout@v4
      - name: run bandit
        run: |
          bandit Django -r -o ./bandit.txt -f txt -c ./.github/bandit.yml
      - name: Archive bandit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: ./bandit.txt
  pyt:
    runs-on: ubuntu-latest
    steps:
      - name: install utils
        run: |
          sudo apt-get update
          sudo apt-get install moreutils -y
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: install python-taint
        run: pip install python-taint
      - name: Checkout
        uses: actions/checkout@v4
      - name: run pyt
        run: |
          pyt -a D -o pyt.txt ./Django
      - name: Archive pyt log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pyt-report
          path: ./pyt.txt
  codeql-analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["python"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
  trivy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: run docker compose
        # Build only the django image; building the full stack would try to
        # build the `frontend` service (`context: ../frontend`), absent in this
        # backend-only checkout.
        run: |
          docker compose build django
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "backend-django:latest"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "1"
          ignore-unfixed: true
